<svg viewBox="0 0 1000 596" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Knowledge architecture of the AI Content Design Coach, organized like a codebase, not a prompt library. Rather than a folder inventory, it shows what the coach knows. The canon is a numbered progression from 01 philosophy through 04 decision-framework, 08 content-standards, 09 decision-library, to 16 escalation. Rules the coach applies: beliefs about why, such as users-dont-read; guidelines about how, such as one-next-step and title-does-the-compare-work; and mistakes about what not to do, such as late-validation. What it knows: component standards, built on Polaris, covering banner, dialog, tooltip, toast and more, with when to use each and what to use instead; terminology, including approved and banned terms, product language, and how to talk about people, our company, UI elements, and our products; and patterns, real cases including mid-period-rate-change and retirement-enrollment. Evidence holds reviews and worked examples. Working memory holds open questions and things to test. The single source of truth is rules dot js, one machine-readable file that feeds the prototypes: a chat app and a form app." font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Root -->
  <text x="500" y="34" font-size="18" font-weight="700" fill="#1e293b" text-anchor="middle">AI Content Design Coach</text>
  <text x="500" y="54" font-size="12.5" fill="#475569" text-anchor="middle">Organized like a codebase, not a prompt library</text>
  <line x1="60" y1="72" x2="940" y2="72" stroke="#e2e8f0" stroke-width="1"/>

