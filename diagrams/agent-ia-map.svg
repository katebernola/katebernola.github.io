  <text x="60" y="118" font-size="11.5" fill="#475569">a numbered progression, 01 → 16</text>
  <line x1="66" y1="126" x2="66" y2="373" stroke="#64748b" stroke-width="1"/>

  <line x1="66" y1="140" x2="74" y2="140" stroke="#64748b" stroke-width="1"/><text x="80" y="144" font-size="11" fill="#475569">01 philosophy</text>
