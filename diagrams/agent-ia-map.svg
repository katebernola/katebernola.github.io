  <line x1="66" y1="171" x2="74" y2="171" stroke="#64748b" stroke-width="1"/><text x="80" y="175" font-size="11" fill="#475569">03 coaching-style</text>
  <line x1="66" y1="186.5" x2="74" y2="186.5" stroke="#64748b" stroke-width="1"/><text x="80" y="190.5" font-size="11" font-weight="600" fill="#1e293b">04 decision-framework</text>
  <line x1="66" y1="202" x2="74" y2="202" stroke="#64748b" stroke-width="1"/><text x="80" y="206" font-size="11" fill="#475569">05 user-journeys</text>
  <line x1="66" y1="217.5" x2="74" y2="217.5" stroke="#64748b" stroke-width="1"/><text x="80" y="221.5" font-size="11" fill="#475569">06 placement-rules</text>
  <line x1="66" y1="233" x2="74" y2="233" stroke="#64748b" stroke-width="1"/><text x="80" y="237" font-size="11" fill="#475569">07 component-standards</text>
  <line x1="66" y1="248.5" x2="74" y2="248.5" stroke="#64748b" stroke-width="1"/><text x="80" y="252.5" font-size="11" fill="#475569">08 content-standards</text>
  <line x1="66" y1="264" x2="74" y2="264" stroke="#64748b" stroke-width="1"/><text x="80" y="268" font-size="11" font-weight="600" fill="#1e293b">09 decision-library</text>
  <line x1="66" y1="279.5" x2="74" y2="279.5" stroke="#64748b" stroke-width="1"/><text x="80" y="283.5" font-size="11" fill="#475569">10 review-process</text>
  <line x1="66" y1="295" x2="74" y2="295" stroke="#64748b" stroke-width="1"/><text x="80" y="299" font-size="11" fill="#475569">11 research-methods</text>
  <line x1="66" y1="310.5" x2="74" y2="310.5" stroke="#64748b" stroke-width="1"/><text x="80" y="314.5" font-size="11" fill="#475569">12 governance</text>
  <line x1="66" y1="326" x2="74" y2="326" stroke="#64748b" stroke-width="1"/><text x="80" y="330" font-size="11" fill="#475569">13 pattern-library</text>
  <line x1="66" y1="341.5" x2="74" y2="341.5" stroke="#64748b" stroke-width="1"/><text x="80" y="345.5" font-size="11" fill="#475569">14 voice-and-tone</text>
  <line x1="66" y1="357" x2="74" y2="357" stroke="#64748b" stroke-width="1"/><text x="80" y="361" font-size="11" fill="#475569">15 icons-and-imagery</text>
  <line x1="66" y1="372.5" x2="74" y2="372.5" stroke="#64748b" stroke-width="1"/><text x="80" y="376.5" font-size="11" fill="#475569">16 escalation</text>

