  <line x1="386" y1="359" x2="394" y2="359" stroke="#64748b" stroke-width="1"/><text x="400" y="363" font-size="11" font-weight="600" fill="#1e293b">late-validation</text>
  <line x1="386" y1="374.5" x2="394" y2="374.5" stroke="#64748b" stroke-width="1"/><text x="400" y="378.5" font-size="11" fill="#475569">indefensible-defaults</text>
  <line x1="386" y1="390" x2="394" y2="390" stroke="#64748b" stroke-width="1"/><text x="400" y="394" font-size="11" fill="#475569">marketing-in-product</text>
  <line x1="386" y1="405.5" x2="394" y2="405.5" stroke="#64748b" stroke-width="1"/><text x="400" y="409.5" font-size="11" fill="#64748b">+ 4 more</text>

  <!-- ============ COLUMN C: what it knows ============ -->
  <text x="700" y="96" font-size="13" font-weight="600" fill="#6B4C9A">What it knows</text>

  <text x="700" y="118" font-size="13" font-weight="700" fill="#1e293b">Component standards</text>
