<svg viewBox="0 0 885 1280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The coach workflow, running as a snake down the page. Kickoff sits at the top. A collaborative discovery process leads to the Brief document, listing overview, objective, persona, workflow and usage data. A collaborative strategy process leads to a group of three stacked documents: content inventory, content audit and gap analysis. Those produce one Content needs document, which produces a pair of side-by-side documents: Plan A, which mitigates UX risks but may add scope, and Plan B, which holds scope but carries UX risk. Both go to a decision where the product owner picks a plan. A collaborative content design process produces the UI plan document, listing component, copy, confidence and risks. A designer-only design execution process follows, with optional usability testing alongside, before the decision where the product owner decides what ships. The designer then submits the Design file, which a bot-only Review process reviews. Review sends two documents: Risks, to the designer, who logs them in Jira; and Knowledge base updates, to the content design team, who review and approve. The work is monitored post-launch. Collaborative steps, where the bot and a person work together, carry a conversation icon. Footnotes: the bot references the knowledge base at every step, the process is iterative throughout, the requester can return to any stage, and the bot applies changes to all artifacts." font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>How the AI content design coach works, end to end</title>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,3.2 L0,6.4" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>

    <!-- icon set -->
    <symbol id="ic-conversation" viewBox="0 0 24 24">
      <path fill="#64748b" d="M17 12V3a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v14l4-4h10a1 1 0 0 0 1-1m4-6h-2v9H6v2a1 1 0 0 0 1 1h11l4 4V7a1 1 0 0 0-1-1"/>
    </symbol>
    <symbol id="ic-person" viewBox="0 0 24 24">
      <path fill="#64748b" d="M9.175 10.825Q8 9.65 8 8t1.175-2.825T12 4t2.825 1.175T16 8t-1.175 2.825T12 12t-2.825-1.175M4 20v-2.8q0-.85.438-1.562T5.6 14.55q1.55-.775 3.15-1.162T12 13t3.25.388t3.15 1.162q.725.375 1.163 1.088T20 17.2V20zm2-2h12v-.8q0-.275-.137-.5t-.363-.35q-1.35-.675-2.725-1.012T12 15t-2.775.338T6.5 16.35q-.225.125-.363.35T6 17.2zm7.413-8.587Q14 8.825 14 8t-.587-1.412T12 6t-1.412.588T10 8t.588 1.413T12 10t1.413-.587"/>
    </symbol>
    <symbol id="ic-robot" viewBox="0 0 24 24">
      <path fill="#64748b" d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13A2.5 2.5 0 0 0 5 15.5A2.5 2.5 0 0 0 7.5 18a2.5 2.5 0 0 0 2.5-2.5A2.5 2.5 0 0 0 7.5 13m9 0a2.5 2.5 0 0 0-2.5 2.5a2.5 2.5 0 0 0 2.5 2.5a2.5 2.5 0 0 0 2.5-2.5a2.5 2.5 0 0 0-2.5-2.5"/>
    </symbol>
    <symbol id="ic-books" viewBox="0 0 24 24">
      <path fill="#64748b" d="M19 18H9a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h1v5l2-1.5L14 7V2h5a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2m-2 2v2H5a2 2 0 0 1-2-2V6h2v14z"/>
    </symbol>
    <symbol id="ic-cycle" viewBox="0 0 24 24">
      <path fill="#64748b" d="M4 12.025q0 2.125 1.063 3.95T7.95 18.9q.35.225.488.613t-.063.737q-.2.375-.612.488t-.788-.088Q4.65 19.3 3.325 17T2 12.025q0-.65.088-1.275t.237-1.25L2 9.7q-.35.225-.75.113t-.6-.463t-.088-.763t.463-.612l3.025-1.75q.35-.2.763-.087t.612.462l1.75 3q.2.35.088.763t-.463.612t-.762.088t-.613-.463l-.85-1.475q-.275.7-.425 1.425T4 12.025M12 4q-1.025 0-2.025.263t-1.9.762q-.375.2-.787.138t-.613-.413q-.225-.4-.1-.812T7.1 3.3q1.125-.65 2.363-.975T12 2q1.975 0 3.788.738t3.237 2.137V4.5q0-.425.288-.712t.712-.288t.713.288t.287.712V8q0 .425-.287.713T20.025 9h-3.5q-.425 0-.712-.288T15.525 8t.288-.712t.712-.288h1.725q-1.15-1.425-2.775-2.212T12 4m6.05 13.275q.95-1.1 1.45-2.425t.5-2.775q0-.425.288-.75T21 11t.713.325t.287.75q0 1.625-.513 3.137T20 18.025t-2.312 2.225t-2.913 1.375l.25.15q.35.2.45.613t-.1.762t-.6.45t-.75-.1l-3.05-1.75q-.35-.2-.462-.613t.087-.762l1.75-3.025q.2-.35.6-.45t.75.1t.463.613t-.088.762l-.925 1.575q1.425-.2 2.688-.888t2.212-1.787"/>
    </symbol>
    <symbol id="ic-rocket" viewBox="0 0 24 24">
      <path fill="#64748b" d="m6 19.05l1.975-.8q-.25-.725-.462-1.475t-.338-1.5l-1.175.8zM10 18h4q.45-1 .725-2.437T15 12.625q0-2.475-.825-4.687T12 4.525q-1.35 1.2-2.175 3.413T9 12.625q0 1.5.275 2.938T10 18m.588-5.587Q10 11.825 10 11t.588-1.412T12 9t1.413.588T14 11t-.587 1.413T12 13t-1.412-.587M18 19.05v-2.975l-1.175-.8q-.125.75-.337 1.5t-.463 1.475zM12 1.975q2.475 1.8 3.738 4.575T17 13l2.1 1.4q.425.275.663.725t.237.95V22l-4.975-2h-6.05L4 22v-5.925q0-.5.238-.95T4.9 14.4L7 13q0-3.675 1.263-6.45T12 1.975"/>
    </symbol>
    <symbol id="ic-edit" viewBox="0 0 24 24">
      <g fill="none" stroke="#64748b" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
        <path d="M7 17v-4l10 -10l4 4l-10 10h-4"/>
        <path d="M3 21h18"/>
        <path d="M14 6l4 4"/>
      </g>
    </symbol>
  </defs>

  <rect x="16" y="16" width="853" height="1248" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>

  <!-- ===== curved connectors ===== -->
  <g fill="none" stroke="#64748b" stroke-width="1.5">
    <path d="M130,127 C128,250 200,240 263,245" marker-end="url(#a)"/>
    <path d="M375,245 C440,225 550,228 690,245" marker-end="url(#a)"/>
    <path d="M745,369 C750,390 752,405 754,418" marker-end="url(#a)"/>
    <path d="M698,490 C650,500 620,498 582,490" marker-end="url(#a)"/>
    <path d="M363,500 C330,512 280,505 230,496" marker-end="url(#a)"/>
    <path d="M170,523 C168,630 192,718 308,702" marker-end="url(#a)"/>
    <path d="M420,700 C460,672 560,668 660,686" marker-end="url(#a)"/>
    <path d="M720,721 C720,760 720,795 720,828" marker-end="url(#a)"/>
    <path d="M663,900 C620,912 560,908 412,905" marker-end="url(#a)"/>
  </g>

  <!-- ===== Kickoff ===== -->
  <ellipse cx="130" cy="100" rx="44" ry="27" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <use href="#ic-person" x="119" y="78" width="22" height="22"/>
  <text x="130" y="115" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Kickoff</text>

  <!-- ===== Discovery (collaborative) ===== -->
  <rect x="55" y="195" width="150" height="76" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <use href="#ic-conversation" x="119" y="208" width="22" height="22"/>
  <text x="130" y="256" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Discovery</text>

  <!-- ===== Brief ===== -->
  <path d="M265,190 H363 L375,202 V333 H265 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M363,190 V202 H375" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="320" y="212" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Brief</text>
  <text x="277" y="237" font-size="10.5" fill="#475569">· Overview</text>
  <text x="277" y="253" font-size="10.5" fill="#475569">· Objective</text>
  <text x="277" y="269" font-size="10.5" fill="#475569">· Persona</text>
  <text x="277" y="285" font-size="10.5" fill="#475569">· Workflow</text>
  <text x="277" y="301" font-size="10.5" fill="#475569">· Usage data</text>

  <!-- ===== Strategy (collaborative) ===== -->
  <rect x="445" y="195" width="150" height="76" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <use href="#ic-conversation" x="509" y="208" width="22" height="22"/>
  <text x="520" y="256" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Strategy</text>

  <!-- ===== GROUP: content inventory / content audit / gap analysis ===== -->
  <path d="M720,160 H818 L830,172 V303 H720 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M818,160 V172 H830" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="775" y="182" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Content inventory</text>

  <path d="M706,192 H804 L816,204 V335 H706 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M804,192 V204 H816" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="761" y="214" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Content audit</text>

  <path d="M692,224 H790 L802,236 V367 H692 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M790,224 V236 H802" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="747" y="246" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Gap analysis</text>

  <!-- ===== Content needs ===== -->
  <path d="M700,420 H798 L810,432 V563 H700 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M798,420 V432 H810" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="755" y="442" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Content needs</text>

  <!-- ===== PAIR: Plan B (behind, right) / Plan A (front, left) ===== -->
  <path d="M470,410 H568 L580,422 V553 H470 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M568,410 V422 H580" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="525" y="432" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Plan B</text>
  <text x="482" y="457" font-size="10.5" fill="#475569">· Holds scope</text>
  <text x="482" y="473" font-size="10.5" fill="#475569">· Carries UX risk</text>

  <path d="M365,430 H463 L475,442 V573 H365 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M463,430 V442 H475" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="420" y="452" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Plan A</text>
  <text x="377" y="477" font-size="10.5" fill="#475569">· Mitigates UX risks</text>
  <text x="377" y="493" font-size="10.5" fill="#475569">· May add scope</text>

  <!-- ===== Decision: P.O. picks a plan ===== -->
  <path d="M170,457 L228,490 L170,523 L112,490 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="170" y="487" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">P.O. picks</text>
  <text x="170" y="501" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">a plan</text>

  <!-- ===== Content design (collaborative) ===== -->
  <rect x="95" y="650" width="150" height="76" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <use href="#ic-conversation" x="159" y="663" width="22" height="22"/>
  <text x="170" y="711" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Content design</text>

  <!-- ===== UI plan ===== -->
  <path d="M310,620 H408 L420,632 V763 H310 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M408,620 V632 H420" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="365" y="642" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">UI plan</text>
  <text x="322" y="667" font-size="10.5" fill="#475569">· Component</text>
  <text x="322" y="683" font-size="10.5" fill="#475569">· Copy</text>
  <text x="322" y="699" font-size="10.5" fill="#475569">· Confidence</text>
  <text x="322" y="715" font-size="10.5" fill="#475569">· Risks</text>

  <!-- ===== Design execution ===== -->
  <rect x="480" y="652" width="120" height="72" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <use href="#ic-person" x="529" y="666" width="22" height="22"/>
  <text x="540" y="712" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Design execution</text>

  <!-- ===== Optional usability testing ===== -->
  <rect x="609" y="748" width="100" height="68" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="659" y="772" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Optional</text>
  <text x="659" y="786" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">usability</text>
  <text x="659" y="800" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">testing</text>

  <!-- ===== Decision: P.O. decides what ships ===== -->
  <path d="M720,655 L778,688 L720,721 L662,688 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="720" y="685" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">P.O. decides</text>
  <text x="720" y="699" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">what ships</text>

  <!-- ===== Design file ===== -->
  <path d="M665,830 H763 L775,842 V973 H665 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M763,830 V842 H775" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="720" y="852" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Design file</text>
  <text x="677" y="877" font-size="10.5" fill="#475569">· Submitted for</text>
  <text x="683" y="893" font-size="10.5" fill="#475569">review</text>

  <!-- ===== Monitored post-launch ===== -->
  <rect x="650" y="995" width="140" height="42" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="720" y="1021" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">Monitored post-launch</text>

  <!-- ===== Review (bot only) ===== -->
  <rect x="470" y="862" width="120" height="72" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <use href="#ic-robot" x="521" y="875" width="18" height="18"/>
  <text x="530" y="922" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Review</text>

  <!-- ===== PAIR: Knowledge base updates (behind, right) / Risks (front, left) ===== -->
  <path d="M300,830 H398 L410,842 V973 H300 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M398,830 V842 H410" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="355" y="850" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Knowledge base</text>
  <text x="355" y="864" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">updates</text>
  <text x="312" y="889" font-size="10.5" fill="#475569">· To content design</text>
  <text x="312" y="905" font-size="10.5" fill="#475569">· They approve</text>

  <path d="M195,850 H293 L305,862 V993 H195 Z" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <path d="M293,850 V862 H305" fill="none" stroke="#64748b" stroke-width="1"/>
  <text x="250" y="872" font-size="11" font-weight="700" fill="#1e293b" text-anchor="middle">Risks</text>
  <text x="207" y="897" font-size="10.5" fill="#475569">· To the designer</text>
  <text x="207" y="913" font-size="10.5" fill="#475569">· Logged in Jira</text>

  <!-- ===== footnotes ===== -->
  <rect x="55" y="1080" width="470" height="124" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>

  <use href="#ic-books" x="76" y="1094" width="16" height="16"/>
  <text x="110" y="1106" font-size="11" fill="#1e293b">The bot references the knowledge base at every step</text>

  <use href="#ic-cycle" x="76" y="1120" width="16" height="16"/>
  <text x="110" y="1132" font-size="11" fill="#1e293b">This process is iterative throughout</text>

  <use href="#ic-rocket" x="76" y="1146" width="16" height="16"/>
  <text x="110" y="1158" font-size="11" fill="#1e293b">The requester can return to any stage</text>

  <use href="#ic-edit" x="76" y="1172" width="16" height="16"/>
  <text x="110" y="1184" font-size="11" fill="#1e293b">The bot applies changes to all artifacts</text>
</svg>
