   Live summary (right rail)
   ========================================================= */
function renderSummary() {
  const s = state;
  const pend = t => `<span class="pending">${t}</span>`;
  const stageName = s.stage ? STAGES[s.stage].name : null;
  const comp = s.intake.componentType ? COMPONENT_TYPES[s.intake.componentType].name : null;
  const userGoals = [...s.userGoals, ...(s.userGoalCustom.trim() ? [s.userGoalCustom.trim()] : [])];
  const kept = s.messages.filter(m => ['keep', 'secondary'].includes(verdictFor(m))).length;
  const cut = s.messages.filter(m => verdictFor(m) === 'cut').length;
  const deferred = s.messages.filter(m => verdictFor(m) === 'defer').length;

  let msgList = '';
  if (s.messages.length) {
    msgList = '<ul class="sum-msgs">' + s.messages.map(m => {
      const v = verdictFor(m);
      const short = m.text.length > 42 ? m.text.slice(0, 40).trim() + '…' : m.text;
      const mark = { keep: '●', secondary: '◐', defer: '◷', cut: '✕' }[v] || '○';
      return `<li><span class="v" aria-hidden="true">${mark}</span><span${v === 'cut' ? ' style="text-decoration:line-through;color:var(--slate-mid)"' : ''}>${esc(short)}</span><span class="sr-only">${v ? VERDICT_LABELS[v] : 'not yet evaluated'}</span></li>`;
    }).join('') + '</ul>';
  }

  $('#summaryBody').innerHTML = `
    <div class="sum-section"><div class="sum-label">Designing</div>
      <div class="sum-value">${comp ? esc(comp) : pend('Not set yet')}</div></div>
    <div class="sum-section"><div class="sum-label">Journey stage</div>
      <div class="sum-value">${stageName ? esc(stageName) : pend('Step 3')}</div></div>
    <div class="sum-section"><div class="sum-label">User wants</div>
      <div class="sum-value">${userGoals.length ? esc(userGoals[0]) + (userGoals.length > 1 ? ` <span class="pending">+${userGoals.length - 1} more</span>` : '') : pend('Step 4')}</div></div>
    <div class="sum-section"><div class="sum-label">Business wants</div>
      <div class="sum-value">${s.businessGoals.length ? esc(s.businessGoals.join(', ')) : pend('Step 5')}</div></div>
    <div class="sum-section"><div class="sum-label">Communication goal</div>
      <div class="sum-value">${s.commPrimary ? esc(COMM_GOALS[s.commPrimary].name) + (s.commSecondary ? ', then ' + esc(COMM_GOALS[s.commSecondary].name.toLowerCase()) : '') : pend('Step 6')}</div></div>
    <div class="sum-section"><div class="sum-label">Messages</div>
      <div class="sum-value">${s.messages.length ? `${kept} kept · ${deferred} deferred · ${cut} cut` : pend('Step 7')}</div>
      ${msgList}</div>
    <div class="sum-section"><div class="sum-label">Standards</div>
      <div class="sum-value">${s.stdCounts ? `${s.stdCounts.pass} pass · ${s.stdCounts.review} review · ${s.stdCounts.fix} fix` : pend('Step 12')}</div></div>`;
}

/* =========================================================
   Steps definition
   ========================================================= */
const steps = [
  /* ---------- 1. Request intake (forked; UX path opens open-ended) ---------- */
  {
    label: 'Request intake',
    title: 'What landed on your desk?',
    render() {
      return `<div class="panel" id="intakeFlow"></div>`;
    },
    wire(el) {
      const it = state.intake;
      let editIdx = null;

      const isUx = () => UX_ROLES.includes(it.role);
      const hasInclude = name => (it.includes || '').split(',').map(s => s.trim()).includes(name);
      const stepsDiffer = () => it.futureOk && it.futureSteps !== 'same' && it.futureSteps.trim() !== (it.todaySteps || '').trim();

      const addInclude = name => {
        const inc = (it.includes || '').split(',').map(s => s.trim()).filter(Boolean);
        if (!inc.includes(name)) inc.push(name);
        it.includes = inc.join(', ');
      };

      /* Silent inference: runs on every free-text answer. Pre-fills what's
         confident; follow-ups collect the rest. Everything filled shows in
         the summary with a Change button. */
      const infer = txt => {
        const t = txt || '';
        if (!(it.product || '').trim()) {
          for (const [p, re] of Object.entries(INFERENCE.products)) { if (re.test(t)) { it.product = p; break; } }
        }
        const tags = (it.audienceTags || '').split(',').map(s => s.trim()).filter(Boolean);
        for (const [tag, re] of Object.entries(INFERENCE.audiences)) { if (re.test(t) && !tags.includes(tag)) tags.push(tag); }
        if (tags.length) it.audienceTags = tags.join(', ');
        const inc = (it.includes || '').split(',').map(s => s.trim()).filter(Boolean);
        for (const [k, re] of Object.entries(INFERENCE.includes)) { if (re.test(t) && !inc.includes(k)) inc.push(k); }
        if (inc.length) it.includes = inc.join(', ');
        if (!(it.projectType || '').trim()) {
          for (const [p, re] of Object.entries(INFERENCE.projectTypes)) { if (re.test(t)) { it.projectType = p; break; } }
        }
        const comms = (it.commsOther || '').split(',').map(s => s.trim()).filter(Boolean);
        for (const [c, re] of Object.entries(INFERENCE.comms)) { if (re.test(t) && !comms.includes(c)) comms.push(c); }
        if (comms.length) it.commsOther = comms.join(', ');
      };

      const inferComponent = () => {
        if (!isUx() || it.componentType) return;
        const inc = it.includes || '';
        it.componentType =
          /Notification/.test(inc) ? 'notification' :
          /Feature awareness|Selling/.test(inc) ? 'announce' :
          it.projectType === 'One-time message' ? 'announce' :
          /A new user|Company setup/.test(inc) ? 'onboarding' :
          'form';
      };

      const buildQs = () => {
        const qs = [];

        qs.push({
          key: 'role', label: 'What’s your role?', type: 'pills',
          pills: [...UX_ROLES, 'Marketing', 'Product', 'Sales or service'],
          get: () => it.role || '',
          set: v => {
            it.role = v;
            it.path = UX_ROLES.includes(v) ? 'ux' : 'outside';
          }
        });

        if (!(it.role || '').trim()) return qs;

        if (isUx()) {
          /* ---------- UX path ---------- */
          qs.push({
            key: 'working', label: 'What are you working on?', type: 'textarea',
            placeholder: 'In your own words.',
            get: () => it.working || '',
            set: v => { it.working = v; infer(v); }
          });
          qs.push({
            key: 'userNeed', label: 'What problem are you trying to solve?', type: 'textarea',
            get: () => it.userNeed || '',
            set: v => { it.userNeed = v; infer(v); }
          });
          qs.push({
            key: 'audienceTags', label: 'Audience — all that apply', type: 'pills-multi',
            pills: [...AUDIENCE_TAGS, 'None of the above'], noFree: true,
            get: () => it.tagsOk ? (it.audienceTags || '') : '',
            display: () => it.audienceTags || '',
            preset: () => it.audienceTags || '',
            set: v => { it.audienceTags = v; it.tagsOk = '1'; }
          });
          qs.push({
            key: 'audience', label: 'Audience specifics', type: 'text',
            placeholder: 'e.g. direct employees only; includes volunteers; excludes contractors',
            get: () => it.audience, set: v => { it.audience = v; infer(v); }
          });
          qs.push({
            key: 'product', label: 'Product', type: 'pills',
            pills: PRODUCTS,
            get: () => it.product || '', set: v => { it.product = v; }
          });
          qs.push({
            key: 'projectType', label: 'Project involves', type: 'pills',
            pills: PROJECT_TYPES,
            scopeNote: { 'New UI': 'New UI is beyond this prototype on purpose — the MVP covers one-time messages and updates to existing UI. Pick the closest in-scope option.' },
            get: () => it.projectType || '', set: v => { it.projectType = v; }
          });
          qs.push({
            key: 'todaySteps', label: 'Step out the user’s experience today', type: 'steps',
            get: () => it.todayOk ? (it.todaySteps || '') : '',
            display: () => (it.todaySteps || '').split('\n').join(' → ')
          });
          qs.push({
            key: 'futureSteps', label: 'After this ships, what changes? Edit the steps that differ', type: 'steps',
            future: true,
            get: () => it.futureOk ? (it.futureSteps || '') : '',
            display: () => it.futureSteps === 'same' ? 'Nothing changes — message only' : (it.futureSteps || '').split('\n').join(' → ')
          });
          if (it.projectType === 'One-time message' || stepsDiffer()) {
            qs.push({
              key: 'clientsImpacted', label: 'How many clients do we know for sure are impacted?', type: 'pills',
              pills: ['All of them', 'A known list', 'We don’t know yet'],
              get: () => it.clientsImpacted || '', set: v => { it.clientsImpacted = v; }
            });
          }
          qs.push({
            key: 'includes', label: 'This project includes — all that apply', type: 'pills-multi',
            pills: INCLUDES,
            get: () => it.includesOk ? (it.includes || '') : '',
            display: () => it.includes || '',
            preset: () => it.includes || '',
            set: v => { it.includes = v; it.includesOk = '1'; inferComponent(); }
          });
          if (hasInclude('Information display screen')) {
            qs.push({
              key: 'displayContent', label: 'List all the content for the display screen', type: 'textarea',
              placeholder: 'One item per line.',
              get: () => it.displayContent || '', set: v => { it.displayContent = v; }
            });
          }
          qs.push({
            key: 'goalType', label: 'Do you want the user to do something, or know something?', type: 'pills',
            pills: ['Do something', 'Know something', 'Both'],
            get: () => it.goalType || '', set: v => { it.goalType = v; }
          });
          qs.push({
            key: 'goal',
            label: it.goalType === 'Do something' ? 'What should they do?'
              : it.goalType === 'Know something' ? 'What should they know — and why?'
              : 'What should they do, and what must they know?',
            type: 'text',
            get: () => it.goal || '', set: v => { it.goal = v; }
          });
          qs.push({
            key: 'commsOther', label: 'How else are we communicating this?', type: 'pills-multi',
            pills: ['Email', 'Rep or advisor outreach', 'In-product message', 'Marketing site', 'Social', 'Nothing else'],
            get: () => it.commsOk ? (it.commsOther || '') : '',
            display: () => it.commsOther || '',
            preset: () => it.commsOther || '',
            set: v => { it.commsOther = v; it.commsOk = '1'; }
          });
          qs.push({
            key: 'draft', label: 'What will the user see or click?', type: 'textarea',
            placeholder: 'Spell it out in plain words — what appears, what they read, what they click.',
            get: () => it.draft, set: v => { it.draft = v; infer(v); }
          });
          qs.push({
            key: 'trigger', label: 'Where did this request come from?', type: 'pills',
            pills: Object.values(TRIGGERS),
            get: () => it.trigger ? TRIGGERS[it.trigger] : '',
            set: v => { it.trigger = Object.keys(TRIGGERS).find(k => TRIGGERS[k] === v) || ''; }
          });
        } else {
          /* ---------- Outside-UX path: small form, plain language, never a draft ---------- */
          qs.push({
            key: 'product', label: 'Which product is this about?', type: 'pills',
            pills: PRODUCTS,
            get: () => it.product || '', set: v => { it.product = v; }
          });
          qs.push({
            key: 'audience', label: 'Who should see this?', type: 'text',
            placeholder: 'e.g. Employees who are eligible but not enrolled',
            get: () => it.audience, set: v => { it.audience = v; }
          });
          qs.push({
            key: 'goal', label: 'What are you trying to achieve?', type: 'pills',
            pills: GOAL_OPTIONS,
            get: () => it.goal || '', set: v => { it.goal = v; }
          });
          qs.push({
            key: 'surface', label: 'Where do you picture this appearing?', type: 'pills',
            pills: ['A popup when they sign in', 'A message on their dashboard', 'A banner across the top', 'An email', 'Not sure — open to suggestions'],
            get: () => it.surface || '',
            set: v => {
              it.surface = v;
              it.componentType = /email/i.test(v) ? 'notification' : 'announce';
            }
          });
          qs.push({
            key: 'cues', label: 'Is anything in the product already pointing users at this?', type: 'pills-multi',
            pills: CUE_SUGGESTIONS,
            get: () => it.cues || '', set: v => { it.cues = v; }
          });
          qs.push({
            key: 'kpiStated', label: 'How will you measure success?', type: 'text',
            placeholder: 'e.g. Enrollment rate, campaign conversions, awareness',
            get: () => it.kpiStated || '', set: v => { it.kpiStated = v; }
          });
          qs.push({
            key: 'kpiAgreed', label: 'Which of these will you accept as the success measure?', type: 'pills-multi',
            pills: KPI_ASSUMPTIONS,
            note: 'campaigns link out of the system, so the furthest we can track is the click that leaves. Inside the platform we can count chatbot visits, Help Center visits, workflow completions, and stage progression.',
            get: () => it.kpiAgreed || '', set: v => { it.kpiAgreed = v; }
          });
          qs.push({
            key: 'commsOther', label: 'How else are we communicating this?', type: 'pills-multi',
            pills: ['Email', 'Rep or advisor outreach', 'In-product message', 'Marketing site', 'Social', 'Nothing else'],
            get: () => it.commsOk ? (it.commsOther || '') : '',
            display: () => it.commsOther || '',
            preset: () => it.commsOther || '',
            set: v => { it.commsOther = v; it.commsOk = '1'; }
          });
          const OUTSIDE_TRIGGERS = {
            'My own idea': 'own',
            'My manager or leadership asked for it': 'stakeholder',
            'A campaign plan calls for it': 'stakeholder',
            'Metrics or a business goal': 'research'
          };
          qs.push({
            key: 'trigger', label: 'Where is this coming from?', type: 'pills',
            pills: Object.keys(OUTSIDE_TRIGGERS),
            get: () => it.triggerLabel || (it.trigger ? TRIGGERS[it.trigger] : ''),
            set: v => {
              it.triggerLabel = v;
              it.trigger = OUTSIDE_TRIGGERS[v] || 'stakeholder';
            }
          });
        }
        return qs;
      };

      const answered = q => (q.get() || '').trim() !== '';
      const shown = q => (q.display ? q.display() : q.get()) || '';

      const activeHtml = q => {
        let body = '';
        if (q.type === 'steps') {
          const today = (it.todaySteps || '').split('\n').filter(Boolean);
          let vals;
          if (q.future) {
            vals = it.futureSteps && it.futureSteps !== 'same' ? it.futureSteps.split('\n') : today.slice();
          } else {
            vals = today.length ? today : ['User signs in', 'User goes to ' + (it.product || 'the product'), '', '', ''];
          }
          while (vals.length < 5) vals.push('');
          body = `
          <div class="intake-free" style="flex-direction:column;align-items:stretch;">
            ${vals.slice(0, 5).map((v, i) => `<input type="text" data-step="${i}" value="${esc(v)}" aria-label="Step ${i + 1}" placeholder="Step ${i + 1}">`).join('')}
            ${q.future ? '' : `<input type="file" data-file accept="image/*" aria-label="Upload a screenshot of the UI"><div class="hint" data-filename>${it.uiImageName ? 'Attached: ' + esc(it.uiImageName) : ''}</div>`}
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button type="button" class="btn" data-continue>Continue</button>
              ${q.future ? `<button type="button" class="pill" data-same>Nothing changes — message only</button>` : ''}
            </div>
          </div>`;
        } else if (q.type === 'pills' || q.type === 'pills-multi') {
          const current = q.preset ? q.preset() : q.get();
          const selected = q.type === 'pills-multi' ? current.split(',').map(s => s.trim()) : [current];
          body = `${q.note ? `<div class="assume-note"><span class="an-label">Alpha’s assumption — challenge it if wrong</span>${esc(q.note)}</div>` : ''}
          <div class="pill-row" role="group" aria-label="Suggested answers">
            ${q.pills.map(p => `<button type="button" class="pill ${selected.includes(p) ? 'selected' : ''}" data-pill="${esc(p)}">${esc(p)}</button>`).join('')}
          </div>
          <div class="scope-note" data-scope hidden></div>
          <div class="intake-free">
            <input type="text" data-free placeholder="Something else…" value="${q.type === 'pills-multi' ? esc(current) : ''}" aria-label="Something else" ${q.noFree ? 'hidden' : ''}>
            ${q.type === 'pills-multi' ? `<button type="button" class="btn" data-continue>Continue</button>` : q.noFree ? '' : `<button type="button" class="btn" data-continue>Continue</button>`}
          </div>`;
        } else if (q.type === 'textarea') {
          body = `<div class="intake-free">
            <textarea data-free rows="4" placeholder="${esc(q.placeholder || '')}" aria-label="${esc(q.label)}">${esc(q.get())}</textarea>
            <button type="button" class="btn" data-continue>Continue</button>
          </div>`;
        } else {
          body = `<div class="intake-free">
            <input type="text" data-free placeholder="${esc(q.placeholder || '')}" value="${esc(q.get())}" aria-label="${esc(q.label)}">
            <button type="button" class="btn" data-continue>Continue</button>
          </div>`;
        }
        return `<div class="intake-q field">
          <label>${esc(q.label)}</label>
          ${body}
        </div>`;
      };

      const renderFlow = () => {
        const flow = $('#intakeFlow', el);
        const qs = buildQs();
        let idx = editIdx !== null ? editIdx : qs.findIndex(q => !answered(q));
        if (idx === -1 || idx > qs.length) idx = qs.length;

        flow.innerHTML = qs.map((q, i) => {
          if (i === idx) return activeHtml(q);
          if (!answered(q)) return '';
          return `<div class="intake-summary">
            <span class="is-label">${esc(q.label)}</span>
            <span class="is-value">${esc(shown(q))}</span>
            <button type="button" class="is-edit" data-i="${i}">Change</button>
          </div>`;
        }).join('') + (idx === qs.length ? '<p class="intake-done">That’s the brief. Check the summary, then continue.</p>' : '');

        $$('.is-edit', flow).forEach(b => b.addEventListener('click', () => { editIdx = +b.dataset.i; renderFlow(); }));

        const q = qs[idx];
        if (!q) return;

        if (q.type === 'steps') {
          const readSteps = () => $$('[data-step]', flow).map(inp => inp.value.trim()).filter(Boolean).join('\n');
          const fileInput = $('[data-file]', flow);
          if (fileInput) fileInput.addEventListener('change', () => {
            if (fileInput.files && fileInput.files[0]) {
              it.uiImageName = fileInput.files[0].name;
              $('[data-filename]', flow).textContent = 'Attached: ' + it.uiImageName;
              touch();
            }
          });
          $('[data-continue]', flow).addEventListener('click', () => {
            const v = readSteps();
            if (!v) return;
            if (q.future) {
              it.futureSteps = v; it.futureOk = '1';
              if (v.trim() !== (it.todaySteps || '').trim()) addInclude('Change management messaging');
            } else {
              it.todaySteps = v; it.todayOk = '1';
            }
            editIdx = null; touch(); renderFlow();
          });
          const same = $('[data-same]', flow);
          if (same) same.addEventListener('click', () => {
            it.futureSteps = 'same'; it.futureOk = '1';
            editIdx = null; touch(); renderFlow();
          });
          const first = $('[data-step]', flow);
          if (first) first.focus();
          return;
        }

        const free = $('[data-free]', flow);

        const advance = val => {
          if (!val.trim()) return;
          q.set(val.trim());
          editIdx = null; touch(); renderFlow();
        };
        $$('button[data-pill]', flow).forEach(b => b.addEventListener('click', () => {
          const p = b.dataset.pill;
          if (q.scopeNote && q.scopeNote[p]) {
            const note = $('[data-scope]', flow);
            note.textContent = q.scopeNote[p];
            note.hidden = false;
            return;
          }
          if (q.type === 'pills-multi') {
            if (/^(none|nothing)\b/i.test(p)) {
              free.value = p;
              $$('button[data-pill]', flow).forEach(x => x.classList.remove('selected'));
              b.classList.add('selected');
            } else {
              const parts = free.value.split(',').map(s => s.trim()).filter(s => s && !/^(none|nothing)\b/i.test(s));
              if (parts.includes(p)) parts.splice(parts.indexOf(p), 1); else parts.push(p);
              free.value = parts.join(', ');
              b.classList.toggle('selected');
              $$('button[data-pill]', flow).forEach(x => { if (/^(none|nothing)\b/i.test(x.dataset.pill)) x.classList.remove('selected'); });
            }
          } else {
            advance(p);
          }
        }));
        const cont = $('[data-continue]', flow);
        if (cont) cont.addEventListener('click', () => advance(free.value));
        if (free && free.tagName === 'INPUT' && !free.hidden) free.addEventListener('keydown', e => { if (e.key === 'Enter') advance(free.value); });
        if (free && !free.hidden) free.focus();
      };

      renderFlow();
    },
    validate() {
      const it = state.intake;
      if (!(it.role || '').trim()) return 'Pick your role first — the questions depend on it.';
      const ux = UX_ROLES.includes(it.role);
      const hasInc = n => (it.includes || '').split(',').map(s => s.trim()).includes(n);
      if (ux) {
        if (!(it.working || '').trim()) return 'Describe what you’re working on.';
        if (!(it.userNeed || '').trim()) return 'Name the problem you’re trying to solve.';
        if (!(it.audienceTags || '').trim() || !it.tagsOk) return 'Confirm the audience categories.';
        if (!it.audience.trim()) return 'Add the audience specifics.';
        if (!(it.product || '').trim()) return 'Pick the product.';
        if (!(it.projectType || '').trim()) return 'Say what the project involves.';
        if (!MVP_PROJECT_TYPES.includes(it.projectType)) return 'New UI is out of scope for this prototype — pick the closest in-scope option.';
        if (!it.todayOk) return 'Step out today’s experience.';
        if (!it.futureOk) return 'Say what changes after this ships — or that nothing does.';
        if ((it.projectType === 'One-time message' || (it.futureSteps !== 'same' && (it.futureSteps || '').trim() !== (it.todaySteps || '').trim())) && !(it.clientsImpacted || '').trim()) return 'Say how many clients we know are impacted.';
        if (!(it.includes || '').trim() || !it.includesOk) return 'Confirm what the project includes.';
        if (hasInc('Information display screen') && !(it.displayContent || '').trim()) return 'List the content for the display screen.';
        if (!(it.goalType || '').trim()) return 'Say whether the user should do something or know something.';
        if (!(it.goal || '').trim()) return 'Spell out what they should do or know.';
        if (!it.commsOk) return 'Say how else we’re communicating this — or "Nothing else."';
        if (!it.draft.trim() && !(it.displayContent || '').trim()) return 'Describe what the user will see or click.';
        if (!it.componentType) it.componentType = 'announce';
      } else {
        if (!(it.product || '').trim()) return 'Name the product.';
        if (!(it.goal || '').trim()) return 'Name the goal — what should be different after this ships?';
        if (!it.audience.trim()) return 'Say who should see this.';
        if (!(it.surface || '').trim()) return 'Say where you picture this appearing.';
        if (!(it.cues || '').trim()) return 'Answer the existing-cues question — or "none" after checking.';
        if (!(it.kpiStated || '').trim()) return 'Say how you’ll measure success.';
        if (!(it.kpiAgreed || '').trim()) return 'Pick at least one in-system measure to accept as success.';
        if (!it.commsOk) return 'Say how else we’re communicating this — or "Nothing else."';
      }
      if (!it.trigger) return 'Pick where the request came from.';
      return null;
    }
  },

  /* ---------- 2. Assumption review ---------- */
  {
    label: 'Assumption review',
    title: 'Every request smuggles in assumptions',
    intro: 'The coach read your intake and found the beliefs hiding inside it. Respond to each one — agreeing is allowed, but say why.',
    render() {
      const cards = buildAssumptions();
      // sync response slots
      if (state.assumptions.length !== cards.length) {
        state.assumptions = cards.map((c, i) => (state.assumptions[i] && state.assumptions[i].title === c.title) ? state.assumptions[i] : { title: c.title, response: '', note: '' });
      }
      return cards.map((c, i) => {
        const a = state.assumptions[i];
        return coachCard({
          ...c,
          extra: `<div class="coach-respond" data-idx="${i}">
            <div class="respond-buttons" role="radiogroup" aria-label="Your response to: ${esc(c.title)}">
              <button type="button" class="pill ${a.response === 'adjust' ? 'selected' : ''}" data-resp="adjust" aria-pressed="${a.response === 'adjust'}">Fair point — I'll adjust</button>
              <button type="button" class="pill ${a.response === 'holds' ? 'selected' : ''}" data-resp="holds" aria-pressed="${a.response === 'holds'}">It holds — here's why</button>
            </div>
            <div class="respond-note" ${a.response ? '' : 'hidden'}>
              <label class="sr-only" for="note-${i}">Your note</label>
              <textarea id="note-${i}" placeholder="${a.response === 'holds' ? 'Your evidence or reasoning (a sentence is plenty)…' : 'What you’ll change or check (optional)…'}">${esc(a.note)}</textarea>
            </div>
          </div>`
        });
      }).join('');
    },
    wire(el) {
      $$('.coach-respond', el).forEach(box => {
        const i = +box.dataset.idx;
        $$('button[data-resp]', box).forEach(btn => btn.addEventListener('click', () => {
          state.assumptions[i].response = btn.dataset.resp;
          $$('button[data-resp]', box).forEach(b => {
            b.classList.toggle('selected', b === btn);
            b.setAttribute('aria-pressed', b === btn);
          });
          $('.respond-note', box).hidden = false;
          touch();
        }));
        $('textarea', box).addEventListener('input', e => { state.assumptions[i].note = e.target.value; touch(); });
      });
    },
    validate() {
      if (state.assumptions.some(a => !a.response)) return 'Respond to every assumption — even "fair point" counts.';
      const holdsNoNote = state.assumptions.find(a => a.response === 'holds' && !a.note.trim());
      if (holdsNoNote) return '"It holds" needs a why. One sentence is plenty.';
      return null;
    }
  },

  /* ---------- 3. Journey stage ---------- */
  {
    label: 'Journey stage',
    title: 'Where is the user in their journey?',
    intro: 'The same words mean different things to a newcomer and a regular. Pick the moment this copy lands in.',
    render() {
      return `
      <div class="panel">
        <div class="choice-grid" role="radiogroup" aria-label="Journey stage">
          ${Object.entries(STAGES).map(([k, v]) => `
            <label class="choice-card ${state.stage === k ? 'selected' : ''}">
              <input type="radio" name="stage" value="${k}" ${state.stage === k ? 'checked' : ''}>
              <span class="choice-name">${v.name}</span>
              <span class="choice-desc">${v.desc}</span>
            </label>`).join('')}
        </div>
      </div>
      <div id="stageCoach">${state.stage ? coachCard({ title: 'What this stage demands', ...STAGE_CARDS[state.stage] }) + stageMismatchCard() : ''}</div>`;
    },
    wire(el) {
      $$('input[name="stage"]', el).forEach(r => r.addEventListener('change', () => {
        state.stage = r.value;
        $$('.choice-card', el).forEach(c => c.classList.toggle('selected', $('input', c).checked));
        $('#stageCoach', el).innerHTML = coachCard({ title: 'What this stage demands', ...STAGE_CARDS[state.stage] }) + stageMismatchCard();
        touch();
      }));
    },
    validate() { return state.stage ? null : 'Pick a stage — the coach cannot challenge a blank.'; }
  },

  /* ---------- 4. User goals ---------- */
  {
    label: 'User goals',
    title: 'What does the user want right now?',
    intro: 'Not what they want from life — what they want in this exact moment, in their own words.',
    render() {
      return `
      <div class="panel">
        <div class="field">
          <label>Pick what fits (fewer is better)</label>
          <div class="pill-row">
            ${USER_GOALS.map(g => `<button type="button" class="pill ${state.userGoals.includes(g) ? 'selected' : ''}" data-goal="${esc(g)}" aria-pressed="${state.userGoals.includes(g)}">${esc(g)}</button>`).join('')}

  /* ---------- 7. Break messages apart ---------- */
  {
    label: 'Break it apart',
    title: 'One message, one idea',
    intro: 'Split your draft into atomic messages — each one a single idea a user could nod at. The next step judges each on its own.',
    render() {
      const draft = (state.intake.draft || '').trim() || (state.intake.displayContent || '').trim();
      const noDraft = state.intake.path === 'outside' || !draft;
      const sc = sentences(draft).length;
      const coach = noDraft
        ? coachCard({
            title: 'No draft — on purpose',
            observation: 'This request came in without copy. That\'s by design.',
            reasoning: 'The message list gets built from the goal, not from wording. Each point a user must take in to act is one message — and each will have to justify itself before any words get polished.',
            recommendation: 'List the points that must land, one per line below. Facts, not sentences: "you\'re eligible", "it takes 10 minutes", "your data carries over". Wordsmithing comes at the very end.',
            tradeoffs: 'Building from facts feels slower than editing a draft. It also avoids polishing a message that shouldn\'t exist.'
          })
        : coachCard({
            title: 'Your draft, weighed',
            observation: `Your draft is about ${wordCount(draft)} words and roughly ${sc} sentence${sc === 1 ? '' : 's'}.`,
            reasoning: 'A "message" is one idea with one job. Bundled ideas hide weak ones behind strong ones — unbundled, each has to justify itself.',
            recommendation: sc > 1
              ? 'Start from the suggested split below, then merge or rewrite until each line is one idea. An "or" between actions usually marks two messages.'
              : 'Even one sentence can hide two ideas ("saved, and by the way, upgrade"). Split anything with an "and" — or an "or" — doing double duty.',
            tradeoffs: 'Splitting too fine makes fragments that read as noise. Too coarse and the weak ideas ride along unexamined.'
          });
      return `
      ${coach}
      ${noDraft ? '' : `<div class="panel">
        <h3>${state.intake.draft.trim() ? 'Your draft' : 'Your content list'}</h3>
        <p style="font-size:16px;color:var(--slate-mid);white-space:pre-wrap;">${esc(draft)}</p>
      </div>`}
      <div class="panel">
        <h3>${noDraft ? 'Points that must land' : 'Atomic messages'}</h3>
        ${!noDraft && sc > 0 && !state.messages.length ? `<p style="margin-bottom:16px;"><button type="button" class="btn ghost-purple" id="autoSplit">Suggest a split from my draft</button></p>` : ''}
        <div id="msgList"></div>
        <button type="button" class="btn secondary" id="addMsg">+ Add a message</button>
      </div>`;
    },
    wire(el) {
      const renderList = () => {
        $('#msgList', el).innerHTML = state.messages.map((m, i) => `
          <div class="msg-card" data-id="${m.id}">
            <div class="msg-top">
              <span class="msg-index">M${i + 1}</span>
              <input type="text" class="msg-text-input" value="${esc(m.text)}" aria-label="Message ${i + 1}">
              <button type="button" class="msg-remove" aria-label="Remove message ${i + 1}">Remove</button>
            </div>
          </div>`).join('');
        $$('.msg-card', el).forEach(card => {
          const id = +card.dataset.id;
          $('.msg-text-input', card).addEventListener('input', e => {
            const m = state.messages.find(x => x.id === id);
            if (m) m.text = e.target.value;
            touch();
          });
          $('.msg-remove', card).addEventListener('click', () => {
            state.messages = state.messages.filter(x => x.id !== id);
            state.order = state.order.filter(x => x !== id);
            renderList(); touch();
          });
        });
      };
      renderList();
      const auto = $('#autoSplit', el);
      if (auto) auto.addEventListener('click', () => {
        const d = (state.intake.draft || '').trim();
        const parts = d ? sentences(d) : (state.intake.displayContent || '').split('\n').map(s => s.trim()).filter(Boolean);
        parts.forEach(s => {
          state.messages.push({ id: state.msgSeq++, text: s, need: '', known: '', placementOverride: '', owner: '', expires: '' });
        });
        auto.parentElement.remove();
        renderList(); touch();
      });
      $('#addMsg', el).addEventListener('click', () => {
        state.messages.push({ id: state.msgSeq++, text: '', need: '', known: '', placementOverride: '', owner: '', expires: '' });

        const inputs = $$('.msg-text-input', el);
        if (inputs.length) inputs[inputs.length - 1].focus();
      });
    },
    validate() {
      state.messages = state.messages.filter(m => m.text.trim());
      if (!state.messages.length) return 'Add at least one message. Use the suggested split if you like.';
      return null;
    }
  },

  /* ---------- 8. Evaluate each message ---------- */
  {
    label: 'Evaluate messages',
    title: 'Make every message earn its place',
    intro: 'Two questions per message. The coach turns your answers into a verdict: keep, support, defer, or cut.',

        <div class="msg-card" data-id="${m.id}">

            <div style="font-size:16px;"><span class="msg-index">M${i + 1}</span>&nbsp; ${esc(m.text)}</div>

          <div class="eval-row">
            <div class="field">
              <label for="need-${m.id}">Does the user need this to act?</label>
              <select id="need-${m.id}" data-key="need">
                <option value="">Choose…</option>
                <option value="act" ${m.need === 'act' ? 'selected' : ''}>Yes — they can't act well without it</option>
                <option value="helps" ${m.need === 'helps' ? 'selected' : ''}>It helps, but they could act without it</option>
                <option value="later" ${m.need === 'later' ? 'selected' : ''}>Not now — a later moment</option>
                <option value="no" ${m.need === 'no' ? 'selected' : ''}>No</option>
              </select>
            </div>

                <option value="maybe" ${m.known === 'maybe' ? 'selected' : ''}>Some do, some don't</option>
                <option value="no" ${m.known === 'no' ? 'selected' : ''}>Probably not</option>
              </select>
            </div>
          </div>
          <div data-role="coach">${verdictCoach(m)}</div>
        </div>`;

  {
    label: 'Visual hierarchy',
    title: 'Who speaks first, and how loudly?',
    intro: 'Order the kept messages. Position one gets read; everything after it gets scanned, maybe.',
    render() {
      const kept = keptMessages();
      if (!state.order.length || kept.some(m => !state.order.includes(m.id))) {
        state.order = recommendedOrderIds();

      return `
      <div class="panel">

        <div id="rankList"></div>
      </div>
      <div id="rankCoach"></div>`;

    wire(el) {
      const renderRank = () => {
        const kept = keptMessages();
        $('#rankList', el).innerHTML = kept.map((m, i) => `
          <div class="rank-item" data-id="${m.id}">
            <span class="rank-pos" aria-hidden="true">${i + 1}</span>
            <div class="rank-body">
              <div class="rank-msg">${esc(m.text)}</div>

            [state.order[idx], state.order[swap]] = [state.order[swap], state.order[idx]];
            renderRank(); renderCoach(); touch();
          }));
        });
      };
      const renderCoach = () => {
        const recIds = recommendedOrderIds();
        const matches = JSON.stringify(recIds) === JSON.stringify(state.order);
        const lead = state.messages.find(m => m.id === state.order[0]);
        const leadV = lead ? verdictFor(lead) : null;
        let card;
        if (!matches && leadV === 'secondary') {
          card = {
            title: 'A support message is leading the room',
            observation: 'Your reading order puts a support message above a need-to-act message.',
            reasoning: 'The first position is the only one with guaranteed attention. Spending it on optional context means the essential message inherits leftover attention.',
            recommendation: 'Lead with a message the user needs in order to act. Let support material support.',
            tradeoffs: 'Sometimes context must come first to make the action make sense — if that is your reasoning here, keep it, on purpose.'
          };

            observation: 'Your order differs from the coach\'s recommendation (need-to-act first, support after).',
            reasoning: 'Reordering is often right — narrative logic can beat priority logic. It is only wrong when it happens by accident.',
            recommendation: 'Read your order top to bottom as a user would. If each line sets up the next, keep it.',
            tradeoffs: 'Narrative order reads better but can bury the lead. Priority order surfaces the lead but can feel abrupt.'

            reasoning: 'This matches how people scan: they take the first thing and sample the rest. The essential message gets the guaranteed slot.',
            recommendation: 'Match the visual treatment to the order — the treatments listed under each message are your spec.',
            tradeoffs: 'Priority order can feel blunt. If the copy reads abruptly in step 12, a connective word beats a reshuffle.'
          };
        }
        $('#rankCoach', el).innerHTML = coachCard(card);
      };
      renderRank(); renderCoach();
    },
    validate() { return null; }
  },

    nextLabel: 'Generate content →',
    title: 'Run it against the standards',
    intro: 'The engine reads every surviving message against five sets of standards. Fix things in place — edits here carry through to the final copy.',
    render() {
      const res = runStandards();
      state.stdCounts = tallyStandards(res);
      save();
      const active = activeStdMessages();
      return `
      <div class="panel">
        <h3>Fix in place</h3>
        <p class="hint" style="font-size:16px;color:var(--slate-mid);margin-bottom:16px;">Edit the copy, name an owner, set a review date. The checks below re-run as you type.</p>
        ${active.map(m => `
          <div class="std-edit-row" data-id="${m.id}">
            <span class="msg-index">${mLabel(m)}</span>
            <input type="text" data-key="text" value="${esc(m.text)}" aria-label="${mLabel(m)} copy">
            <input type="text" data-key="owner" value="${esc(m.owner || '')}" placeholder="Owner (who keeps this true?)" aria-label="${mLabel(m)} owner">
            <input type="text" data-key="expires" value="${esc(m.expires || '')}" placeholder="Review date" aria-label="${mLabel(m)} review date">
          </div>`).join('')}
      </div>
      <div id="stdResults">${stdResultsHtml(res)}</div>`;
    },
    wire(el) {
      let t;
      const refresh = () => {
        clearTimeout(t);
        t = setTimeout(() => {
          const res = runStandards();
          state.stdCounts = tallyStandards(res);
          $('#stdResults', el).innerHTML = stdResultsHtml(res);
          touch();
        }, 400);
      };
      $$('.std-edit-row', el).forEach(row => {
        const m = state.messages.find(x => x.id === +row.dataset.id);
        $$('input', row).forEach(inp => inp.addEventListener('input', () => {
          m[inp.dataset.key] = inp.value;
          refresh();
        }));
      });
    },
    validate() { return null; }
  },

  /* ---------- 13. Generate content ---------- */
  {
    label: 'Content',
    title: 'Now — and only now — the words',
    intro: 'Drafts to react to, not final copy — going through Alpha is a process, not an approval. The coach can rough in structure; you bring the craft.',
    render() {
      const kept = keptMessages();
      let html = coachCard({
        title: 'How these drafts were made',
        observation: `${kept.length} message${kept.length === 1 ? '' : 's'} survived. Primary goal: ${COMM_GOALS[state.commPrimary].name.toLowerCase()}. Stage: ${STAGES[state.stage].name.toLowerCase()}.`,
        reasoning: 'Each draft applies your strategy: filler stripped, the goal\'s structure suggested, the lead message given first-line treatment. A rule-based coach can enforce discipline; it cannot hear tone the way you can.',
        recommendation: 'Read each variant aloud in the user\'s moment. Keep what survives being spoken; rewrite what does not.',
        tradeoffs: 'Template structures make copy consistent but can flatten voice. Bend the structure before you break the strategy.'
      });

      html += kept.map((m, i) => {
        const variants = generateVariants(m, i === 0);
        return `
        <div class="panel">
          <h3>${i + 1}. ${i === 0 ? 'Lead message' : (verdictFor(m) === 'secondary' ? 'Support message' : 'Message')}</h3>
          <p style="font-size:16px;color:var(--slate-mid);margin-bottom:8px;">Original: "${esc(m.text)}" · ${esc(PLACEMENTS[m.placementOverride || placementDefault(m)].toLowerCase())}</p>
          ${variants.map(v => `
            <div class="copy-block">
              <div class="copy-label">${esc(v.label)}</div>
              <div>${esc(v.text)}</div>
              <div class="copy-note">${esc(v.note)}</div>
            </div>`).join('')}
        </div>`;
      }).join('');

      const deferred = state.messages.filter(m => verdictFor(m) === 'defer');
      if (deferred.length) {
        html += `<div class="panel"><h3>Deferred for later moments</h3>
          ${deferred.map(m => `<p style="font-size:16px;">"${esc(m.text)}" — write it when its moment has a design.</p>`).join('')}</div>`;
      }

      html += `<div class="key-insight">
        <div class="ki-label">Key insight</div>
        <div class="ki-text">You made ${steps.length - 1} decisions before writing a word. That is what makes the words defensible.</div>
      </div>
      <p style="margin-top:32px;"><button type="button" class="btn secondary" id="restartEnd">Run another request through the workshop</button></p>`;
      return html;
    },
    wire(el) {
      $('#restartEnd', el).addEventListener('click', restart);
    },
    validate() { return null; }
  }
];

/* =========================================================
   Navigation and rendering
   ========================================================= */
function touch() { save(); renderSummary(); }

function renderStepper() {
  $('#stepList').innerHTML = steps.map((s, i) => {
    const n = i + 1;
    const cls = ['step-item'];
    if (n === state.current) cls.push('current');
    else if (n < state.furthest || (n <= state.furthest && n < state.current)) cls.push('done');
    if (n <= state.furthest) cls.push('reachable'); else cls.push('locked');
    const done = cls.includes('done');
    return `<li class="${cls.join(' ')}" data-step="${n}" ${n <= state.furthest ? 'tabindex="0" role="link"' : 'aria-disabled="true"'} aria-current="${n === state.current ? 'step' : 'false'}">
      <span class="step-num" aria-hidden="true">${done ? '✓' : n}</span><span>${s.label}</span></li>`;
  }).join('');
  $$('#stepList .step-item.reachable').forEach(li => {
    const go = () => goTo(+li.dataset.step);
    li.addEventListener('click', go);
    li.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
  });
  const pct = Math.round(((state.current - 1) / (steps.length - 1)) * 100);
  $('#progressFill').style.width = pct + '%';
  $('#progressLabel').textContent = `Step ${state.current} of ${steps.length}`;
}

function renderMain() {
  const i = state.current - 1;
  const step = steps[i];
  const ws = $('#workspace');
  ws.innerHTML = `
    <div class="step-kicker">Step ${state.current} of ${steps.length}</div>
    <h2 class="step-title">${step.title}</h2>
    <div id="stepBody">${step.render()}</div>
    <p class="validation-msg" id="valMsg" role="alert"></p>
    <div class="step-nav">
      ${state.current > 1 ? '<button type="button" class="btn secondary" id="backBtn">← Back</button>' : '<span></span>'}
      ${state.current < steps.length ? `<button type="button" class="btn" id="nextBtn">${step.nextLabel || 'Continue →'}</button>` : ''}
    </div>`;
  step.wire($('#stepBody', ws));
  const back = $('#backBtn', ws);
  if (back) back.addEventListener('click', () => goTo(state.current - 1, true));
  const next = $('#nextBtn', ws);
  if (next) next.addEventListener('click', () => {
    const err = step.validate();
    const vm = $('#valMsg', ws);
    if (err) { vm.textContent = err; vm.classList.add('show'); return; }
    vm.classList.remove('show');
    goTo(state.current + 1, true);
  });
  window.scrollTo({ top: 0 });
}

function goTo(n, skipValidate) {
  if (n < 1 || n > steps.length) return;
  if (n > state.furthest + 0 && !skipValidate) return;
  if (n > state.furthest) state.furthest = n;
  if (n <= state.furthest || skipValidate) state.current = n;
  if (state.current > state.furthest) state.furthest = state.current;
  save();
  renderStepper(); renderMain(); renderSummary();
}

function restart() {
  if (!confirm('Start over? This clears the whole workshop.')) return;
  state = blankState();
  save();
  renderStepper(); renderMain(); renderSummary();
}

$('#restartBtn').addEventListener('click', restart);

load();
renderStepper();
renderMain();
renderSummary();
</script>
</body>
</html>
